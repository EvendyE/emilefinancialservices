spring.security.oauth2.resourceserver.jwt.jwk-set-uri = https://localhost:443/oauth2/jwks

server.servlet.context-path=/emilefinancialservices

# sets the SameSite attribute to None for the JSESSIONID cookie to allow the cookie to be sent to the domain of the cross-origin requestor.
server.servlet.session.cookie.same-site=NONE

# the Secure attribute must be set to true when setting SameSite=None, so the cookie will only be sent over HTTPS.
server.servlet.session.cookie.secure=true

# configures the application to use cookies for session management instead of URL rewriting e.g., appending a semicolon and jsessionid 
# to the URL adversely prompting HttpFirewall to reject cross origin requests on the basis of a semicolon in the URL.
server.servlet.session.tracking-modes=cookie

logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web.reactive.function.client.WebClient=DEBUG

# directs Spring Boot to a self-signed SSL certificate placed in the classpath to serve localhost on HTTPS using the same, but converted, 
